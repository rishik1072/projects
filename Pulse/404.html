<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050507" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Page not found — Pulse</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050507;
        color: #f7f7fa;
      }

      * { box-sizing: border-box; }
      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 16%, rgb(139 92 246 / 0.24), transparent 32rem),
          radial-gradient(circle at 82% 30%, rgb(34 211 238 / 0.18), transparent 34rem),
          radial-gradient(circle at 50% 100%, rgb(244 114 182 / 0.14), transparent 34rem),
          #050507;
      }

      .shell {
        position: relative;
        width: min(92vw, 720px);
        padding: clamp(28px, 6vw, 56px);
        border: 1px solid rgb(255 255 255 / 0.1);
        border-radius: 36px;
        background: linear-gradient(180deg, rgb(255 255 255 / 0.08), rgb(255 255 255 / 0.035));
        box-shadow: 0 34px 130px rgb(0 0 0 / 0.5), inset 0 1px 0 rgb(255 255 255 / 0.1);
        backdrop-filter: blur(24px);
        text-align: center;
      }

      .shell::before {
        content: "";
        position: absolute;
        inset: -80px;
        z-index: -1;
        background: linear-gradient(135deg, #8b5cf6, #f472b6 48%, #22d3ee);
        opacity: 0.16;
        filter: blur(60px);
      }

      .logo {
        width: 56px;
        height: 56px;
        margin: 0 auto 28px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #8b5cf6, #f472b6 48%, #22d3ee);
        box-shadow: 0 18px 60px rgb(139 92 246 / 0.32);
        font-weight: 900;
        letter-spacing: -0.08em;
      }

      p.kicker {
        margin: 0 0 12px;
        color: #22d3ee;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-size: 12px;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(48px, 12vw, 96px);
        line-height: 0.9;
        letter-spacing: -0.075em;
      }

      .copy {
        max-width: 520px;
        margin: 24px auto 0;
        color: #b5b6c4;
        font-size: 18px;
        line-height: 1.65;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        margin-top: 32px;
        padding: 0 22px;
        border-radius: 999px;
        background: #fff;
        color: #050507;
        font-size: 14px;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 0 18px 44px rgb(255 255 255 / 0.16);
      }

      a:focus-visible {
        outline: 2px solid #22d3ee;
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="logo" aria-hidden="true">P</div>
      <p class="kicker">404 · Signal lost</p>
      <h1>Track not found.</h1>
      <p class="copy">The page you’re looking for drifted out of the queue. Head back to Pulse and keep listening.</p>
      <a href="/">Return home</a>
    </main>
  </body>
</html>
